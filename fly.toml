# Fly.io deployment — Travel AI
# Database: Supabase (free, pgvector) — set DATABASE_URL secret
# Redis:    Upstash via `fly ext upstash redis create` — sets UPSTASH_REDIS_DATABASE_URL
# AI:       set OLLAMA_BASE_URL to an external Ollama instance, or swap provider

app = "travel-ai"
primary_region = "cdg"

[build]
  dockerfile = "travel-ai-backend/Dockerfile"

[env]
  SPRING_PROFILES_ACTIVE = "prod"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[http_service.concurrency]
  type = "connections"
  hard_limit = 25
  soft_limit = 20

[[http_service.checks]]
  grace_period = "60s"
  interval = "30s"
  method = "GET"
  path = "/actuator/health"
  timeout = "10s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
