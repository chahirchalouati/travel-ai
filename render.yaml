databases:
  - name: travelai-db
    databaseName: travelai
    user: travelai
    plan: free

services:
  # Backend - Spring Boot
  - type: web
    name: travel-ai-backend
    runtime: docker
    dockerfilePath: ./travel-ai-backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: travelai-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: travelai-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: travelai-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: travelai-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: travelai-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
