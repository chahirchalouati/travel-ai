<nav [class.scrolled]="scrolled()">
  <div class="container nav-inner">
    <a href="/" class="nav-logo" aria-label="TravelAI home">
      <span class="nav-logo-text">Travel<span class="nav-logo-accent">AI</span></span>
      <span class="nav-logo-dot" aria-hidden="true"></span>
    </a>

    <ul class="nav-tabs" role="list">
      @for (tab of tabs; track tab.label) {
        <li>
          <a [href]="tab.href" [class.active]="tab.active">{{ tab.label }}</a>
        </li>
      }
    </ul>

    <div class="nav-actions">
      <a href="#" class="nav-sign-in">Sign In</a>
      <a href="#cta" class="btn btn-primary nav-cta-btn">Start Planning</a>
    </div>

    <button class="nav-hamburger" (click)="openMenu()" aria-label="Open navigation" [attr.aria-expanded]="mobileOpen()">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- Mobile Menu -->
<div class="nav-mobile-overlay" [class.open]="mobileOpen()" role="dialog" aria-label="Navigation">
  <div class="nav-mobile-header">
    <a href="/" class="nav-logo" aria-label="TravelAI home">
      <span class="nav-logo-text">Travel<span class="nav-logo-accent">AI</span></span>
      <span class="nav-logo-dot" aria-hidden="true"></span>
    </a>
    <button class="nav-mobile-close" (click)="closeMenu()" aria-label="Close menu">
      <span></span><span></span>
    </button>
  </div>
  <div class="nav-mobile-links">
    @for (tab of tabs; track tab.label) {
      <a [href]="tab.href" (click)="closeMenu()">{{ tab.label }}</a>
    }
    <a href="#" class="nav-mobile-sign-in" (click)="closeMenu()">Sign In</a>
    <a href="#cta" class="btn btn-primary nav-mobile-cta" (click)="closeMenu()">Start Planning</a>
  </div>
</div>
