<section id="hero" aria-labelledby="hero-heading">
  <div class="container">
    <div class="hero-content">
      <h1 id="hero-heading" class="hero-title reveal">
        Where to next?
      </h1>

      <p class="hero-subtitle reveal reveal-delay-1">
        Discover destinations, read reviews, and plan trips with AI
      </p>

      <div class="hero-search reveal reveal-delay-2">
        <div class="search-bar" role="search">
          <span class="search-icon ms" aria-hidden="true">search</span>
          <input
            type="text"
            class="search-input"
            [value]="searchQuery()"
            (input)="onInput($any($event.target).value)"
            (focus)="onFocus()"
            (blur)="onBlur()"
            placeholder="Search destinations, trips, experiences..."
            autocomplete="off"
            aria-label="Search destinations"
          >
          <button
            class="ask-ai-btn"
            (click)="askAI()"
            aria-label="Ask AI"
          >
            <span class="ms" aria-hidden="true">auto_awesome</span>
            Ask AI
          </button>
          <button
            class="search-submit"
            (click)="planTrip()"
            [disabled]="isPlanning()"
            aria-label="Plan my trip"
          >
            {{ isPlanning() ? 'Planning...' : 'Search' }}
            <span class="ms" aria-hidden="true">search</span>
          </button>
        </div>
      </div>

      <div class="hero-quick-picks reveal reveal-delay-3" role="list" aria-label="Popular destinations">
        @for (p of quickPicks; track p.dest) {
          <button class="quick-pill" role="listitem" (click)="setQuickPick(p.dest)">
            <span class="quick-pill-emoji">{{ p.label.split(' ')[0] }}</span>
            <span>{{ p.label.split(' ').slice(1).join(' ') }}</span>
          </button>
        }
      </div>
    </div>
  </div>
</section>
