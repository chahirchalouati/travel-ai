version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: travelai-postgres
    environment:
      POSTGRES_DB: travelai
      POSTGRES_USER: travelai
      POSTGRES_PASSWORD: travelai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: travelai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: travelai-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travelai-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/travelai
      SPRING_DATASOURCE_USERNAME: travelai
      SPRING_DATASOURCE_PASSWORD: travelai
      SPRING_DATA_REDIS_HOST: redis
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars!!}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
