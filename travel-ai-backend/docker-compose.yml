version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: travelai-postgres
    environment:
      POSTGRES_DB: travelai
      POSTGRES_USER: travelai
      POSTGRES_PASSWORD: travelai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: travelai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: travelai-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  ollama:
    image: ollama/ollama:latest
    container_name: travelai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: travelai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: travelai
      MINIO_ROOT_PASSWORD: travelai-secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the bucket on startup so the app can upload immediately.
  minio-init:
    image: minio/mc:latest
    container_name: travelai-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 travelai travelai-secret) do echo 'waiting for minio'; sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/travelai-media;
      /usr/bin/mc anonymous set download local/travelai-media;
      exit 0;
      "

